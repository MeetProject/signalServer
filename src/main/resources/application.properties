spring.application.name=signalserver
spring.config.import=optional:file:.env.local[.properties]
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:database
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

signal.media-server.id=${MEDIA_SERVER_ID:mediaServer}
signal.media-server.token=${MEDIA_SERVER_TOKEN:local-media-server-token}